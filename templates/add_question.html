<!DOCTYPE html>
<html>

<head>
    <title>Add Question</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Add New Question</h1>

    <form action="/save_question" method="POST">

        <input type="text"
               name="question"
               placeholder="Enter Question"
               required>

        <br><br>

        <input type="text"
               name="option1"
               placeholder="Option 1"
               required>

        <br><br>

        <input type="text"
               name="option2"
               placeholder="Option 2"
               required>

        <br><br>

        <input type="text"
               name="option3"
               placeholder="Option 3"
               required>

        <br><br>

        <input type="text"
               name="option4"
               placeholder="Option 4"
               required>

        <br><br>

        <input type="text"
               name="answer"
               placeholder="Correct Answer"
               required>

        <br><br>

        <button type="submit">
            Save Question
        </button>

    </form>

</div>

</body>
</html>
